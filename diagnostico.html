<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico</title>
<style>
  body { font-family: monospace; padding: 16px; background: #111; color: #0f0; font-size: 14px; }
  .test { margin-bottom: 20px; padding: 12px; border: 1px solid #333; border-radius: 8px; }
  .ok { color: #0f0; }
  .err { color: #f55; }
  button { padding: 10px 16px; margin: 4px 0; background: #333; color: #fff; border: none; border-radius: 6px; }
</style>
</head>
<body>
<h2>Diagnóstico de carga de datos</h2>

<div class="test">
  <strong>1. fetch() simple</strong>
  <div id="r1">Pendiente...</div>
  <button onclick="testFetch()">Probar fetch()</button>
</div>

<div class="test">
  <strong>2. JSONP (script dinámico)</strong>
  <div id="r2">Pendiente...</div>
  <button onclick="testJsonp()">Probar JSONP</button>
</div>

<div class="test">
  <strong>3. Info del navegador</strong>
  <div id="r3"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbze1URJjUqVdIYAuTUhmkELblAenK-mWuR3xc-9jApvI92Wy4oarmQv1FZtsO1s5NwQSA/exec";

document.getElementById("r3").innerHTML = navigator.userAgent;

async function testFetch() {
  const el = document.getElementById("r1");
  el.innerHTML = "Cargando...";
  try {
    const resp = await fetch(`${SCRIPT_URL}?action=listas`);
    el.innerHTML = `<span class="ok">Status: ${resp.status} ${resp.statusText}</span>`;
    const text = await resp.text();
    el.innerHTML += `<br>Respuesta (primeros 200 car.): ${text.substring(0,200)}`;
  } catch (err) {
    el.innerHTML = `<span class="err">ERROR: ${err.name} - ${err.message}</span>`;
  }
}

function testJsonp() {
  const el = document.getElementById("r2");
  el.innerHTML = "Cargando...";
  window.cb_diag = (data) => {
    el.innerHTML = `<span class="ok">OK! Recibido: ${JSON.stringify(data).substring(0,200)}</span>`;
    delete window.cb_diag;
  };
  const s = document.createElement("script");
  s.src = `${SCRIPT_URL}?action=listas&callback=cb_diag`;
  s.onerror = (e) => { el.innerHTML = `<span class="err">onerror disparado</span>`; };
  document.head.appendChild(s);
  setTimeout(() => {
    if (el.innerHTML === "Cargando...") el.innerHTML = `<span class="err">TIMEOUT - nunca llamó al callback (10s)</span>`;
  }, 10000);
}
</script>
</body>
</html>
